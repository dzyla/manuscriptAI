# Add this inside your server {} block in /etc/nginx/sites-available/manuscript-search.org
# Replace your current `location /search { ... }` block with this one.
#
# Root cause of "*, *" error: nginx was adding Access-Control-Allow-Origin: *
# on top of the header FastAPI already sends, producing a duplicate that
# browsers reject. Fix: let FastAPI's headers pass through for real requests;
# only add CORS headers in the OPTIONS preflight block (where FastAPI is bypassed).

location /search {
    # --- CORS preflight (handled by nginx, never reaches FastAPI) ---
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'  '*';
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key';
        add_header 'Access-Control-Max-Age'       86400;
        add_header 'Content-Type'                 'text/plain; charset=utf-8';
        add_header 'Content-Length'               0;
        return 204;
    }

    # --- Real request: proxy to FastAPI, do NOT add CORS headers here ---
    # FastAPI already returns Access-Control-Allow-Origin: * on every response.
    # Adding it again in nginx produces "*, *" which browsers reject.
    proxy_pass         http://localhost:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}
