# Add this inside your server {} block in /etc/nginx/sites-available/manuscript-search.org
# Replace `proxy_pass http://localhost:8080;` with the block below.
#
# The key additions are:
#   1. Handle OPTIONS preflight and return 204 immediately (no proxy)
#   2. Add Access-Control-Allow-* headers to every real response

location /search {
    # --- CORS preflight ---
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'  '*';
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key';
        add_header 'Access-Control-Max-Age'       86400;
        add_header 'Content-Type'                 'text/plain; charset=utf-8';
        add_header 'Content-Length'               0;
        return 204;
    }

    # --- Real request ---
    add_header 'Access-Control-Allow-Origin'  '*' always;
    add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key' always;

    proxy_pass         http://localhost:8080;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}
